<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>Home page</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>

    <body>
        <main>
            <header>
                <nav>
                    <div class="container-nav">
                        <div class="logo">
                            <img src="images/50x50.svg" alt="Logo">
                            <h1>XYZ Inc</h1>
                        </div>
                        <a href="home.html" class="site-link">Home</a>
                        <a href="profile.html" class="site-link">Profile</a>
                        <a href="timesheet.html" class="site-link">Timesheet</a>
                    </div>
                </nav>
            </header>

            <section >
                <div class="Page-h1">
                    <h1>Timesheet</h1>
                    <p>Enter hours for current work period</p>
                </div>
                
            </section>

            <section>
                <div class="form-container" id="form-container">
                    <div class="form" id="form">
                        <label for="Monday">Monday:</label>
                        <input type="number" id="Monday" name="Monday" min="0" max="24">
                    </div>

                    <div class="form" id="form">
                        <label for="Tuesday">Tuesday:</label>
                        <input type="number" id="Tuesday" name="Tuesday" min="0" max="24">
                    </div>

                    <div class="form" id="form">
                        <label for="Wednesday">Wednesday:</label>
                        <input type="number" id="Wednesday" name="Wednesday" min="0" max="24">
                    </div>

                    <div class="form" id="form">
                        <label for="Thursday">Thursday:</label>
                        <input type="number" id="Thursday" name="Thursday" min="0" max="24">
                    </div>

                    <div class="form" id="form">
                        <label for="Friday">Friday:</label>
                        <input type="number" id="Friday" name="Friday" min="0" max="24">

                        <div class="btn" id="btn">
                            <button type="submit">Submit</button>
                        </div>
                    </div>

            </section>

            <footer>
                <nav>
                    <div class="container-nav" id="container-nav-footer">
                        <p>Made for CPRG 213</p>
                        <p>Widget icons created by zafdesign-Flaticon</p>
                    </div>
                </nav>
            </footer>
        </main>
    </body>
